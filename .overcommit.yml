PreCommit:
  RuboCop:
    enabled: true
    required_executable: 'bundle'
    command: ['bundle', 'exec', 'rubocop']
    on_warn: fail

CommitMsg:
  MessageFormat:
    enabled: true
    pattern: '^(revert: )?(feat|fix|perf|refactor|docs|style|test|build|chore|ci)(\([\w\-.,]+\))?(!)?: .+'
    message: 'Use Conventional Commits, e.g. feat(k8s): add Helm provisioner'
